name: yangji_zhushou
description: "养基助手 - 基金投资管理工具"
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 1.0.0+1

environment:
  sdk: ^3.12.2

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # 基础能力
  dio: ^5.7.0                       # 网络请求
  shared_preferences: ^2.3.0        # 本地键值存储
  cached_network_image: ^3.4.1      # 网络图片缓存

  # 状态管理
  flutter_riverpod: ^2.6.1          # Riverpod 状态管理

  # 路由
  go_router: ^14.8.1                # 声明式路由

  # 本地存储
  hive: ^2.2.3                      # 结构化本地存储 (页面缓存)
  hive_flutter: ^1.1.0              # Hive Flutter 初始化
  path_provider: ^2.1.5             # 文件路径 (Hive 依赖)

  # 实时通信 (SignalR via WebSocket)
  web_socket_channel: ^3.0.2        # WebSocket 客户端 (SignalR 底层)

  # 图表
  fl_chart: ^0.70.2                 # 折线图/饼图 (收益曲线、分布图)

  # 主题
  flex_color_scheme: ^8.1.0         # Material Design 3 主题构建

  # 工具
  intl: ^0.20.2                     # 国际化/日期格式化
  url_launcher: ^6.3.1              # 打开外部链接
  share_plus: ^10.1.4               # 分享
  image_picker: ^1.1.2              # 图片选择 (头像/OCR上传)
  permission_handler: ^11.3.1       # 权限请求
  package_info_plus: ^8.3.0         # 应用包信息 (版本检查)

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # 代码生成
  build_runner: ^2.4.15

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  assets:
    # Tab 图标 (浅色 + 深色)
    - assets/tab_icons/home.png
    - assets/tab_icons/home-a.png
    - assets/tab_icons/home-black.png
    - assets/tab_icons/position.png
    - assets/tab_icons/position-a.png
    - assets/tab_icons/position-black.png
    - assets/tab_icons/taboptional.png
    - assets/tab_icons/tab_optional.png
    - assets/tab_icons/taboptional-black.png
    - assets/tab_icons/marketTrends.png
    - assets/tab_icons/marketTrends-a.png
    - assets/tab_icons/marketTrends-black.png
    - assets/tab_icons/vip.png
    - assets/tab_icons/vip-a.png
    - assets/tab_icons/vip-black.png
    - assets/tab_icons/user.png
    - assets/tab_icons/user-a.png
    - assets/tab_icons/user-black.png
    # 页面图片
    - assets/images/img/position-bg.png
    - assets/images/img/position-bg1.png
    - assets/images/img/fundqun.png
    - assets/images/img/logos.png
    - assets/images/img/banner1.png
    - assets/images/img/banner1-text-white.png
    - assets/images/img/upico.png
    - assets/images/img/down.png
    - assets/images/img/upindex.png
    - assets/images/img/downindex.png
    - assets/images/img/leftico.png
    - assets/images/img/tongzhi.png
    - assets/images/img/photo.png
    - assets/images/img/tzico.png

  fonts:
    - family: siyuanheitiCNRegular
      fonts:
        - asset: assets/fonts/siyuanheitiCNRegular.ttf
    - family: DIN
      fonts:
        - asset: assets/fonts/DIN-Alternate.ttf
    - family: iconfont
      fonts:
        - asset: assets/fonts/iconfont.ttf
