name: iOS Build

on:
  workflow_dispatch:
    inputs:
      build_id:
        description: "Unique build identifier"
        required: true
        type: string
      ios_path:
        description: "Path to iOS project"
        required: false
        type: string
        default: "ios"
      scheme:
        description: "Xcode scheme to build"
        required: false
        type: string
        default: "Runner"
      use_signing:
        description: "Enable code signing"
        required: false
        type: boolean
        default: false
      configuration:
        description: "Build configuration"
        required: false
        type: string
        default: "Debug"
      flutter_version:
        description: "Flutter version"
        required: false
        type: string
        default: "3.44.4"

jobs:
  build-ios:
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.4"
          channel: stable
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Install dependencies
        run: flutter pub get

      - name: Build unsigned debug IPA
        run: flutter build ipa --debug --no-codesign

      - name: Package unsigned IPA
        run: |
          set -e
          rm -f "build/${{ inputs.build_id }}.ipa"
          echo "Build outputs:"
          find build -maxdepth 6 \( -name "*.ipa" -o -name "*.app" \) -print
          IPA_PATH=$(find build -maxdepth 6 -name "*.ipa" -type f | head -1)
          APP_PATH=$(find build -maxdepth 6 -name "*.app" -type d | head -1)
          if [ -n "$IPA_PATH" ]; then
            cp "$IPA_PATH" "build/${{ inputs.build_id }}.ipa"
          elif [ -n "$APP_PATH" ]; then
            rm -rf build/Payload
            mkdir -p build/Payload
            cp -R "$APP_PATH" build/Payload/
            (cd build && zip -qry "${{ inputs.build_id }}.ipa" Payload)
            rm -rf build/Payload
          else
            echo "No IPA or .app found"
            find build -maxdepth 6 -type f -o -type d
            exit 1
          fi
          test -f "build/${{ inputs.build_id }}.ipa"
          ls -lh "build/${{ inputs.build_id }}.ipa"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ipa
          path: build/*.ipa
          if-no-files-found: error
