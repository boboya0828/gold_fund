name: iOS Build

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      build_id:
        description: "Unique build identifier"
        required: true
        type: string
      ios_path:
        description: "Path to iOS project"
        required: false
        type: string
        default: "ios"
      scheme:
        description: "Xcode scheme to build"
        required: false
        type: string
        default: "Runner"
      use_signing:
        description: "Enable code signing"
        required: false
        type: boolean
        default: true
      configuration:
        description: "Build configuration"
        required: false
        type: string
        default: "Release"
      flutter_version:
        description: "Flutter version"
        required: false
        type: string
        default: "3.44.4"

jobs:
  build-ios:
    runs-on: macos-latest
    timeout-minutes: 30
    env:
      BUILD_ID: ${{ github.event.inputs.build_id || github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.4"
          channel: stable
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Install dependencies
        run: flutter pub get

      - name: Install Apple signing assets
        env:
          IOS_CERTIFICATE: ${{ secrets.IOS_CERTIFICATE }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          IOS_PROVISIONING_PROFILE: ${{ secrets.IOS_PROVISIONING_PROFILE }}
          KEYCHAIN_PASSWORD: ${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          set -euo pipefail
          if [ -z "${IOS_CERTIFICATE:-}" ] || [ -z "${IOS_CERTIFICATE_PASSWORD:-}" ] || [ -z "${IOS_PROVISIONING_PROFILE:-}" ]; then
            echo "Missing iOS signing secrets. Expected IOS_CERTIFICATE, IOS_CERTIFICATE_PASSWORD, IOS_PROVISIONING_PROFILE."
            exit 1
          fi

          CERTIFICATE_PATH="$RUNNER_TEMP/build_certificate.p12"
          PROFILE_PATH="$RUNNER_TEMP/build_profile.mobileprovision"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          echo -n "$IOS_CERTIFICATE" | base64 --decode -o "$CERTIFICATE_PATH"
          echo -n "$IOS_PROVISIONING_PROFILE" | base64 --decode -o "$PROFILE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$IOS_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          security cms -D -i "$PROFILE_PATH" > "$RUNNER_TEMP/profile.plist"
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c 'Print UUID' "$RUNNER_TEMP/profile.plist")
          cp "$PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/$PROFILE_UUID.mobileprovision"

      - name: Create export options
        run: |
          cat > ios/ExportOptions.plist <<'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>development</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>M7CXGX86SJ</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.gold.xuansheng</key>
              <string>YangJiZhu_Dev</string>
            </dict>
            <key>compileBitcode</key>
            <false/>
            <key>stripSwiftSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF

      - name: Build signed IPA
        run: |
          flutter build ipa --release \
            --export-options-plist=ios/ExportOptions.plist \
            --build-name=1.0.0 \
            --build-number=${{ github.run_number }}

      - name: Package signed IPA
        run: |
          set -e
          rm -f "build/$BUILD_ID.ipa"
          echo "Build outputs:"
          find build -maxdepth 6 \( -name "*.ipa" -o -name "*.app" \) -print
          IPA_PATH=$(find build -maxdepth 6 -name "*.ipa" -type f | head -1)
          APP_PATH=$(find build -maxdepth 6 -name "*.app" -type d | head -1)
          if [ -n "$IPA_PATH" ]; then
            cp "$IPA_PATH" "build/$BUILD_ID.ipa"
          elif [ -n "$APP_PATH" ]; then
            rm -rf build/Payload
            mkdir -p build/Payload
            cp -R "$APP_PATH" build/Payload/
            (cd build && zip -qry "$BUILD_ID.ipa" Payload)
            rm -rf build/Payload
          else
            echo "No IPA or .app found"
            find build -maxdepth 6 -type f -o -type d
            exit 1
          fi
          test -f "build/$BUILD_ID.ipa"
          ls -lh "build/$BUILD_ID.ipa"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ipa
          path: build/*.ipa
          if-no-files-found: error
