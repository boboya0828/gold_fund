name: iOS Build

on:
  workflow_dispatch:
    inputs:
      build_id:
        description: "Unique build identifier"
        required: true
        type: string
      ios_path:
        description: "Path to iOS project"
        required: false
        type: string
        default: "ios"
      scheme:
        description: "Xcode scheme to build"
        required: false
        type: string
        default: "Runner"
      use_signing:
        description: "Enable code signing"
        required: false
        type: boolean
        default: false
      configuration:
        description: "Build configuration"
        required: false
        type: string
        default: "Debug"
      flutter_version:
        description: "Flutter version"
        required: false
        type: string
        default: "3.44.4"

jobs:
  build-ios:
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.4"
          channel: stable
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Install dependencies
        run: flutter pub get

      - name: Build unsigned debug IPA
        run: flutter build ipa --debug --no-codesign

      - name: Package unsigned IPA
        run: |
          mkdir -p build/ios/ipa
          mkdir -p build/Payload
          if [ -d build/ios/iphoneos/Runner.app ]; then
            rm -rf build/Payload
            mkdir -p build/Payload
            cp -R build/ios/iphoneos/Runner.app build/Payload/
            (cd build && zip -qry "${{ inputs.build_id }}.ipa" Payload)
            cp "build/${{ inputs.build_id }}.ipa" build/ios/ipa/gold_fund-debug-unsigned.ipa
            rm -rf build/Payload
          fi
          ls -la build
          ls -la build/ios/ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ipa
          path: |
            build/${{ inputs.build_id }}.ipa
            build/ios/ipa/*.ipa
          if-no-files-found: error
